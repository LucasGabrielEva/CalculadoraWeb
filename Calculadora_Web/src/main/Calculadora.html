<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Web - Tema iOS</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Fonte parecida com a da Apple */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000; /* Fundo preto iOS */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        /* Cartões em Cinza Escuro (estilo painel iOS) */
        .card {
            background: #1c1c1e;
            padding: 30px;
            border-radius: 18px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2, h3 {
            color: #ffffff;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Campos de Entrada Escuros */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: #333333; /* Cinza escuro */
            color: #ffffff;
            transition: background 0.3s;
        }

        input::placeholder {
            color: #8e8e93; /* Cinza claro iOS */
        }

        input:focus {
            outline: none;
            background: #48484a;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        /* Estilo Base dos Botões */
        button {
            padding: 15px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            transition: filter 0.2s;
        }

        button:active {
            filter: brightness(1.3);
        }

        /* Cores iOS */
        .btn-orange { background: #ff9f0a; color: #ffffff; }
        .btn-dark { background: #333333; color: #ffffff; }
        .btn-light { background: #a5a5a5; color: #000000; }
        .btn-danger { background: #ff3b30; color: #ffffff; width: 100%; margin-bottom: 15px; }

        .span-2 { grid-column: span 2; }

        .resultado-box {
            margin-top: 25px;
            padding: 15px;
            background: #000000;
            border-radius: 10px;
            font-size: 1.1em;
            color: #ffffff;
            border: 1px solid #333;
        }

        #resultado {
            font-weight: 600;
            font-size: 1.5em;
            color: #ff9f0a; /* Resultado em laranja para destacar */
            display: block;
            margin-top: 5px;
        }

        .erro {
            color: #ff3b30;
            font-size: 0.9em;
            margin-top: 10px;
            min-height: 20px;
        }

        ul {
            list-style-type: none;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        /* Scrollbar escura */
        ul::-webkit-scrollbar { width: 6px; }
        ul::-webkit-scrollbar-track { background: #1c1c1e; }
        ul::-webkit-scrollbar-thumb { background: #48484a; border-radius: 8px; }

        li {
            border-bottom: 1px solid #333333;
            padding: 12px 0;
            font-size: 15px;
            color: #d1d1d6;
        }
        li:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Calculadora</h2>
        <input type="number" id="num1" placeholder="Primeiro Número" step="any">
        <input type="number" id="num2" placeholder="Segundo Número (opcional)" step="any">

        <div class="botoes">
            <button class="btn-orange" onclick="calcular('+')">Soma (+)</button>
            <button class="btn-orange" onclick="calcular('-')">Subtração (-)</button>
            <button class="btn-orange" onclick="calcular('*')">Multiplicação (×)</button>
            <button class="btn-orange" onclick="calcular('/')">Divisão (÷)</button>

            <button class="btn-dark" onclick="calcular('%')">Porcentagem (%)</button>
            <button class="btn-dark" onclick="calcular('^')">Potência (^)</button>

            <button class="btn-light span-2" onclick="calcular('sqrt')">Raiz Quadrada (√x)</button>
        </div>

        <div class="resultado-box">
            Resultado
            <span id="resultado">-</span>
        </div>
        <div class="erro" id="mensagemErro"></div>
    </div>

    <div class="card" id="historico">
        <h3>Histórico</h3>
        <button class="btn-danger" onclick="limparHistorico()">Limpar Histórico</button>
        <ul id="listaHistorico"></ul>
    </div>
</div>

<script>
    // Conexão com o Spring Boot restaurada para o modelo de 2 inputs
    const API_URL = 'http://localhost:8080/api/calculadora';

    async function calcular(operador) {
        const num1 = document.getElementById('num1').value;
        const num2 = document.getElementById('num2').value;
        const erroEl = document.getElementById('mensagemErro');
        const resEl = document.getElementById('resultado');

        erroEl.innerText = '';
        resEl.innerText = '-';

        if (!num1) {
            erroEl.innerText = 'Preencha ao menos o primeiro número.';
            return;
        }

        try {
            const response = await fetch(`${API_URL}/calcular`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    numero1: parseFloat(num1),
                    numero2: num2 ? parseFloat(num2) : null,
                    operador: operador
                })
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text);
            }

            const data = await response.json();
            resEl.innerText = data.resultado;
            carregarHistorico();

        } catch (error) {
            erroEl.innerText = error.message;
        }
    }

    async function carregarHistorico() {
        try {
            const response = await fetch(`${API_URL}/historico`);
            const historico = await response.json();
            const lista = document.getElementById('listaHistorico');
            lista.innerHTML = '';

            // O reverse() faz com que a conta mais nova fique no topo da lista
            historico.reverse().forEach(op => {
                const li = document.createElement('li');
                let texto = op.operador === 'sqrt'
                    ? `√${op.numero1} = ${op.resultado}`
                    : `${op.numero1} ${op.operador} ${op.numero2} = ${op.resultado}`;
                li.innerText = texto;
                lista.appendChild(li);
            });
        } catch(e) {
            console.log("Erro ao carregar histórico");
        }
    }

    async function limparHistorico() {
        await fetch(`${API_URL}/historico`, { method: 'DELETE' });
        carregarHistorico();
    }

    // Carrega o histórico ao iniciar a página
    carregarHistorico();
</script>
</body>
</html>
